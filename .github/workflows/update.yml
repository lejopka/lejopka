name: Update VPN Configs
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python check.py
      - run: |
          git config user.name "lejopka-bot"
          git config user.email "bot@lejopka"
          git add -A
          git diff --staged --quiet || git commit -m "update $(date -u '+%Y-%m-%d %H:%M')"
          git push
